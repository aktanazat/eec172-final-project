<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="660" viewBox="0 0 1220 660" role="img" aria-labelledby="title desc">
  <title id="title">AEGIS-172 State Machine</title>
  <desc id="desc">State machine with boot, calibrate, mission fetch, active round, cloud judge, round end, and failsafe local mode transitions.</desc>

  <defs>
    <style>
      .bg { fill: #0b1220; }
      .node { fill: #10233a; stroke: #4db4ff; stroke-width: 2; rx: 14; }
      .node-alt { fill: #163028; stroke: #67e287; stroke-width: 2; rx: 14; }
      .text { fill: #e8f3ff; font: 600 22px 'Chakra Petch', 'Trebuchet MS', sans-serif; }
      .sub { fill: #b8cde3; font: 400 14px 'Chakra Petch', 'Trebuchet MS', sans-serif; }
      .arrow { stroke: #7fd7ff; stroke-width: 2.5; marker-end: url(#arrowhead); fill: none; }
      .label { fill: #89aecd; font: 600 13px 'Chakra Petch', 'Trebuchet MS', sans-serif; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7fd7ff" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1220" height="660" />

  <rect class="node" x="70" y="80" width="210" height="92" />
  <text class="text" x="98" y="122">BOOT + SELFTEST</text>
  <text class="sub" x="98" y="147">Hardware init + sanity checks</text>

  <rect class="node" x="350" y="80" width="220" height="92" />
  <text class="text" x="385" y="122">CALIBRATE</text>
  <text class="sub" x="385" y="147">Baseline sensor fields</text>

  <rect class="node" x="640" y="80" width="240" height="92" />
  <text class="text" x="668" y="122">MISSION FETCH</text>
  <text class="sub" x="668" y="147">IoT request + S3 mission</text>

  <rect class="node-alt" x="950" y="80" width="200" height="92" />
  <text class="text" x="983" y="122">LOCAL MODE</text>
  <text class="sub" x="983" y="147">Cloud fallback mission</text>

  <rect class="node" x="300" y="270" width="280" height="110" />
  <text class="text" x="345" y="320">ACTIVE ROUND</text>
  <text class="sub" x="345" y="346">Scan, defend, score stream</text>

  <rect class="node" x="640" y="270" width="260" height="110" />
  <text class="text" x="675" y="320">CLOUD JUDGE</text>
  <text class="sub" x="675" y="346">Lambda score + next seed</text>

  <rect class="node" x="470" y="470" width="280" height="110" />
  <text class="text" x="522" y="520">ROUND END</text>
  <text class="sub" x="522" y="546">Display winner + persist replay</text>

  <path class="arrow" d="M280 126 H350" />
  <text class="label" x="302" y="112">init ok</text>

  <path class="arrow" d="M570 126 H640" />
  <text class="label" x="592" y="112">baseline locked</text>

  <path class="arrow" d="M760 172 V270 H438" />
  <text class="label" x="767" y="230">mission loaded</text>

  <path class="arrow" d="M880 126 H950" />
  <text class="label" x="892" y="112">cloud timeout</text>

  <path class="arrow" d="M1050 172 V325 H580" />
  <text class="label" x="958" y="240">fallback mission start</text>

  <path class="arrow" d="M580 325 H640" />
  <text class="label" x="592" y="310">round complete</text>

  <path class="arrow" d="M770 380 V470" />
  <text class="label" x="778" y="430">winner computed</text>

  <path class="arrow" d="M610 470 V380" />
  <text class="label" x="467" y="430">next round requested</text>

  <path class="arrow" d="M440 270 V172" />
  <text class="label" x="290" y="224">recalibrate command</text>
</svg>
