<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="760" viewBox="0 0 1220 760" role="img" aria-labelledby="title desc">
  <title id="title">AEGIS-172 System Architecture</title>
  <desc id="desc">Block diagram showing CC3200, UNO co-processor, sensors, user interface modules, and AWS IoT Lambda S3 cloud pipeline.</desc>

  <defs>
    <style>
      .bg { fill: #0b1220; }
      .cc { fill: #17324f; stroke: #67cbff; stroke-width: 2.2; }
      .uno { fill: #1c3a34; stroke: #7cf3a2; stroke-width: 2.2; }
      .cloud { fill: #3d2b16; stroke: #ffc068; stroke-width: 2.2; }
      .io { fill: #101c2d; stroke: #87aecd; stroke-width: 1.6; }
      .t { fill: #e8f3ff; font: 700 21px 'Chakra Petch', 'Trebuchet MS', sans-serif; }
      .s { fill: #bbd2e8; font: 500 14px 'Chakra Petch', 'Trebuchet MS', sans-serif; }
      .arrowA { stroke: #6fd0ff; stroke-width: 2.4; marker-end: url(#arrA); fill: none; }
      .arrowB { stroke: #86f0b1; stroke-width: 2.4; marker-end: url(#arrB); fill: none; }
      .arrowC { stroke: #ffc068; stroke-width: 2.4; marker-end: url(#arrC); fill: none; }
      .label { fill: #a7c6e4; font: 600 13px 'Chakra Petch', 'Trebuchet MS', sans-serif; }
    </style>
    <marker id="arrA" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6fd0ff" />
    </marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#86f0b1" />
    </marker>
    <marker id="arrC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffc068" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1220" height="760" />

  <rect class="cc" x="420" y="70" width="380" height="160" rx="16" />
  <text class="t" x="510" y="120">CC3200 MAIN CONTROLLER</text>
  <text class="s" x="458" y="154">State machine, scoring, mission control, cloud sync</text>
  <text class="s" x="458" y="180">SPI display chain, UART coprocessor protocol, I2C expansion</text>

  <rect class="uno" x="420" y="310" width="380" height="160" rx="16" />
  <text class="t" x="500" y="360">UNO CO-PROCESSOR</text>
  <text class="s" x="466" y="394">Stepper + servo actuation, scan timing, low-level sensing</text>
  <text class="s" x="466" y="420">Deterministic frame response and local failsafe</text>

  <rect class="io" x="70" y="300" width="280" height="180" rx="14" />
  <text class="t" x="132" y="345">SENSORS</text>
  <text class="s" x="94" y="378">HC-SR04, photoresistor, tilt, DHT11, IR receiver</text>
  <text class="s" x="94" y="404">Joystick + buttons for direct interaction</text>

  <rect class="io" x="870" y="300" width="280" height="180" rx="14" />
  <text class="t" x="932" y="345">ACTUATORS / UI</text>
  <text class="s" x="895" y="378">ULN2003 stepper, SG90 servo, RGB LED, buzzers</text>
  <text class="s" x="895" y="404">LCD1602 + 7-segment displays via 74HC595</text>

  <rect class="cloud" x="320" y="560" width="580" height="150" rx="18" />
  <text class="t" x="528" y="608">AWS CLOUD PIPELINE</text>
  <text class="s" x="360" y="640">IoT Core: shadow + telemetry topics</text>
  <text class="s" x="360" y="665">Lambda: mission_generator, score_engine, replay_builder</text>
  <text class="s" x="360" y="690">S3: mission JSON, replay artifacts, leaderboard snapshot</text>

  <path class="arrowB" d="M350 390 H420" />
  <text class="label" x="360" y="374">sensor stream</text>

  <path class="arrowB" d="M800 390 H870" />
  <text class="label" x="808" y="374">control outputs</text>

  <path class="arrowA" d="M610 230 V310" />
  <text class="label" x="622" y="272">UART</text>

  <path class="arrowA" d="M560 310 V230" />
  <text class="label" x="490" y="272">ack/status UART</text>

  <path class="arrowC" d="M610 470 V560" />
  <text class="label" x="620" y="520">TLS MQTT + HTTPS</text>

  <path class="arrowC" d="M560 560 V470" />
  <text class="label" x="435" y="520">missions + scores</text>

  <path class="arrowA" d="M800 145 H1040 V300" />
  <text class="label" x="914" y="129">SPI / GPIO display path</text>

  <path class="arrowB" d="M420 145 H180 V300" />
  <text class="label" x="148" y="129">I2C/GPIO intake</text>
</svg>
